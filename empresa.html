<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<title>Ficha empresa · Bot Inversiones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8e8f0;--muted:#6b6b80;
  --compra:#00e896;--vigilar:#f5c542;--alerta:#ff4d6d;--accent:#6c63ff;
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.5;}
.shell{max-width:960px;margin:0 auto;padding:0 16px 60px;position:relative;z-index:1;}
nav{padding:20px 0;margin-bottom:24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.back{background:none;border:1px solid var(--border2);color:var(--muted);font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:4px;cursor:pointer;text-decoration:none;transition:border-color .2s,color .2s;display:inline-flex;align-items:center;gap:6px;}
.back:hover{border-color:var(--accent);color:var(--accent);}
.nbc{color:var(--muted);font-size:11px;letter-spacing:.06em;}
.nbc span{color:var(--text);}
.hero{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:start;margin-bottom:28px;}
.hticker{font-family:var(--display);font-size:clamp(28px,6vw,44px);font-weight:800;letter-spacing:-.03em;line-height:1;}
.hnombre{color:var(--muted);font-size:13px;margin-top:6px;}
.hmeta{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.pill{font-size:10px;padding:3px 9px;border-radius:3px;border:1px solid var(--border2);color:var(--muted);letter-spacing:.06em;}
.hright{text-align:right;}
.hprecio{font-family:var(--display);font-size:26px;font-weight:700;line-height:1;}
.hsenal{margin-top:8px;display:flex;justify-content:flex-end;}
.sb{font-size:11px;font-weight:500;letter-spacing:.07em;padding:4px 10px;border-radius:4px;}
.s-COMPRA{background:rgba(0,232,150,.12);color:var(--compra);border:1px solid rgba(0,232,150,.3);}
.s-VIGILAR{background:rgba(245,197,66,.10);color:var(--vigilar);border:1px solid rgba(245,197,66,.3);}
.s-NEUTRO{background:rgba(90,90,114,.15);color:var(--muted);border:1px solid var(--border2);}
.s-ALERTA_SALIDA{background:rgba(255,77,109,.10);color:var(--alerta);border:1px solid rgba(255,77,109,.3);}
.sgrid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:20px;}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 14px 12px;}
.scl{font-size:10px;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;margin-bottom:8px;}
.scv{font-family:var(--display);font-size:24px;font-weight:700;line-height:1;margin-bottom:8px;}
.scb{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.scf{height:100%;border-radius:2px;}
.caprow{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.caplbl{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;min-width:110px;}
.ci{display:flex;align-items:center;gap:7px;font-size:12px;}
.cd{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cd.on{background:var(--compra);}
.cd.off{background:var(--border2);}
.cl2{color:var(--muted);}
.cl2.on{color:var(--text);}
.razrow{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:16px;}
.ri{display:flex;align-items:flex-start;gap:8px;font-size:12px;padding:3px 0;}
.ridot{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0;}
.ritxt{color:var(--muted);line-height:1.5;}
.alerta-item{background:rgba(255,77,109,.07);border:1px solid rgba(255,77,109,.2);border-left:3px solid var(--alerta);border-radius:0 6px 6px 0;padding:10px 14px;font-size:12px;color:#c0a0a8;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.adot{width:6px;height:6px;border-radius:50%;background:var(--alerta);flex-shrink:0;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stitle{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.chart-outer{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:28px;}
.cfilters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.sfbtn{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;opacity:.4;}
.sfbtn.on{opacity:1;border-color:var(--border2);color:var(--text);}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cwrap{position:relative;height:280px;}
.cempty{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:12px;flex-direction:column;gap:8px;}
.mgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:28px;}
.mgrupo{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.mgtitle{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 14px 8px;border-bottom:1px solid var(--border);}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);transition:background .1s;}
.mrow:last-child{border-bottom:none;}
.mrow:hover{background:var(--bg3);}
.mk{color:var(--muted);font-size:11px;}
.mv{font-weight:500;font-size:12px;}
.vg{color:var(--compra);}
.vw{color:var(--vigilar);}
.vb{color:var(--alerta);}
.vn{color:var(--text);}
.fshero{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:20px;margin-bottom:8px;}
.fsnum{font-family:var(--display);font-size:40px;font-weight:800;line-height:1;}
.fsbars{display:flex;gap:3px;margin-left:auto;}
.fsbar{width:8px;height:28px;border-radius:2px;}
.fsitems{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:28px;}
.fsi{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:8px;font-size:11px;}
.fsc{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;margin-top:1px;}
.fsc.ok{background:rgba(0,232,150,.15);color:var(--compra);border:1px solid rgba(0,232,150,.3);}
.fsc.ko{background:rgba(255,77,109,.10);color:var(--alerta);border:1px solid rgba(255,77,109,.2);}
.fst{color:var(--muted);line-height:1.4;}
.fst.ok{color:var(--text);}
footer{text-align:center;padding:24px 0 0;color:var(--muted);font-size:10px;letter-spacing:.08em;border-top:1px solid var(--border);margin-top:16px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeIn .35s ease forwards;}
@media(max-width:600px){
  .sgrid{grid-template-columns:repeat(3,minmax(0,1fr));}
  .mgrid{grid-template-columns:1fr;}
  .fsitems{grid-template-columns:repeat(2,minmax(0,1fr));}
  .hero{grid-template-columns:1fr;}
  .hright{text-align:left;}
  .hsenal{justify-content:flex-start;}
}

/* ── DCF ──────────────────────────────────────────────────────────────────── */
.dcf-wrap{margin-bottom:28px;}
.dcf-resumen{
  background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:0 8px 8px 0;padding:12px 16px;font-size:12px;color:#a0a0c0;
  margin-bottom:16px;line-height:1.6;
}
.dcf-resumen.positivo{border-left-color:#00e896;color:#80d0a0;}
.dcf-resumen.negativo{border-left-color:#ff4d6d;color:#c08090;}

.dcf-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.dcf-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.dcf-card-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);padding:10px 14px 8px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.dcf-card-sub{font-size:10px;color:var(--muted);}

/* Escenarios */
.esc-row{display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;border-bottom:1px solid var(--border);}
.esc-row:last-child{border-bottom:none;}
.esc-label{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.esc-dot{width:7px;height:7px;border-radius:50%;}
.esc-precio{font-size:16px;font-weight:700;font-family:var(--display);}
.esc-g{font-size:10px;color:var(--muted);text-align:right;}
.esc-margen{font-size:11px;font-weight:500;}

/* Gauge margen de seguridad */
.gauge-wrap{padding:16px 14px 14px;}
.gauge-label{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.gauge-track{height:8px;background:var(--border);border-radius:4px;position:relative;overflow:visible;margin-bottom:6px;}
.gauge-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.gauge-marker{position:absolute;top:-3px;width:2px;height:14px;background:rgba(255,255,255,.3);border-radius:1px;}
.gauge-vals{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);}
.gauge-main{font-family:var(--display);font-size:32px;font-weight:800;text-align:center;
  padding:10px 0 4px;line-height:1;}
.gauge-main-sub{text-align:center;font-size:11px;color:var(--muted);margin-bottom:8px;}

/* Reverse DCF */
.rdcf-row{display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px;border-bottom:1px solid var(--border);}
.rdcf-row:last-child{border-bottom:none;}
.rdcf-bar-row{padding:8px 14px;border-bottom:1px solid var(--border);}
.rdcf-bar-label{font-size:10px;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between;}
.rdcf-track{height:6px;background:var(--border);border-radius:3px;position:relative;}
.rdcf-bar-a{height:100%;border-radius:3px;}
.rdcf-marker{position:absolute;top:-2px;width:2px;height:10px;border-radius:1px;}
.rdcf-interp{padding:10px 14px;font-size:11px;color:var(--muted);font-style:italic;line-height:1.5;}

/* Métodos comparativa */
.metodos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;padding:12px 14px;}
.metodo-item{text-align:center;}
.metodo-nombre{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.metodo-precio{font-size:18px;font-weight:700;font-family:var(--display);}
.metodo-diff{font-size:11px;margin-top:2px;}

/* Analistas */
.analistas-strip{display:flex;align-items:center;gap:16px;padding:10px 14px;
  border-top:1px solid var(--border);flex-wrap:wrap;}
.an-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.an-lbl{font-size:10px;color:var(--muted);}
.an-val{font-size:14px;font-weight:600;}

@media(max-width:580px){.dcf-grid{grid-template-columns:1fr;}}

</style>
</head>
<body>
<div class="shell">
  <nav>
    <a href="index.html" class="back">&#8592; Ranking</a>
    <span class="nbc">Bot Inversiones · <span id="nav-ticker">—</span></span>
  </nav>
  <div id="main">
    <div style="text-align:center;padding:60px 0;color:var(--muted);font-size:12px;letter-spacing:.1em">CARGANDO...</div>
  </div>
</div>
<footer>Bot Inversiones · datos via Yahoo Finance · actualizacion diaria al cierre</footer>

<script>
const SERIES=[
  {key:'composite',label:'Score compuesto',color:'#6c63ff',on:true},
  {key:'quality',  label:'Calidad',         color:'#00e896',on:true},
  {key:'valuation',label:'Valoracion',      color:'#f5c542',on:true},
  {key:'momentum', label:'Momentum',        color:'#ff6b35',on:false},
  {key:'safety',   label:'Seguridad',       color:'#4ecdc4',on:false},
  {key:'fscore',   label:'F-Score x10',     color:'#a78bfa',on:false},
  {key:'precio',   label:'Precio (norm.)',  color:'#94a3b8',on:false},
];
const FSLABELS={
  A1_roa_positivo:'ROA positivo',
  A2_cfo_positivo:'CFO positivo',
  A3_roa_mejora:'ROA mejora YoY',
  A4_accruals_bajo:'Accruals bajos',
  B1_deuda_disminuye:'Deuda LP disminuye',
  B2_liquidez_mejora:'Liquidez corriente mejora',
  'B3_sin_diluci\u00f3n':'Sin dilucion accionarial',
  B3_sin_dilucion:'Sin dilucion accionarial',
  C1_margen_bruto_mejora:'Margen bruto mejora',
  C2_rotacion_activos:'Rotacion de activos mejora',
};

let chartInst=null, historial=[], empresa=null, ticker='';

async function init(){
  const p=new URLSearchParams(window.location.search);
  ticker=(p.get('ticker')||'').toUpperCase();
  if(!ticker){err('Ticker no especificado.');return;}
  document.getElementById('nav-ticker').textContent=ticker;
  document.title=ticker+' · Bot Inversiones';
  const[res,hist]=await Promise.all([loadJ('data/resultados.json'),loadJ('data/historial_scores.json')]);
  empresa=(res?.empresas||[]).find(e=>e.ticker===ticker)||null;
  historial=hist?.[ticker]||[];
  if(!empresa){err('No hay datos para '+ticker+'.');return;}
  render();
}

async function loadJ(path){
  try{const r=await fetch(path+'?t='+Date.now());if(!r.ok)throw 0;return await r.json();}catch{return null;}
}
function err(msg){
  document.getElementById('main').innerHTML=
    '<div style="text-align:center;padding:60px;color:var(--muted)">'+msg+
    '<br><br><a href="index.html" style="color:var(--accent);font-size:12px">Volver al ranking</a></div>';
}

function getSenal(sig){
  return sig?.['se\u00f1al']||sig?.senal||sig?.signal||'NEUTRO';
}

function render(){
  const m=empresa.metrics||{};
  const sc=empresa.scores||{};
  const sig=empresa['se\u00f1al']||empresa.senal||empresa.signal||{};
  const senal=getSenal(sig);
  const razones=sig.razones||[];
  const alertas=sig.alertas||[];
  const capas=sig.capas||0;
  const mon=m.moneda==='EUR'?'€':'$';
  const pFmt=m.precio!=null?m.precio.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' '+mon:'—';

  document.getElementById('main').innerHTML=`
    <div class="hero anim">
      <div>
        <div class="hticker">${ticker}</div>
        <div class="hnombre">${m.nombre||empresa.nombre||''}</div>
        <div class="hmeta">
          <span class="pill">${m.sector||'—'}</span>
          <span class="pill">${m.pais||'—'}</span>
          <span class="pill">Confianza: ${sc.confianza||'—'}</span>
          <span class="pill">${historial.length} dia${historial.length!==1?'s':''} de historial</span>
        </div>
      </div>
      <div class="hright">
        <div class="hprecio">${pFmt}</div>
        <div class="hsenal"><span class="sb s-${senal}">${senal}</span></div>
      </div>
    </div>

    <div class="sgrid anim" style="animation-delay:.05s">${sc5HTML(sc)}</div>

    <div class="caprow anim" style="animation-delay:.08s">
      <div class="caplbl">Capas alineadas</div>
      ${capHTML(capas>=1,'Valoracion atractiva')}
      ${capHTML(capas>=2,'Fundamentales solidos')}
      ${capHTML(capas>=3,'Momentum positivo')}
      <div style="margin-left:auto;font-size:11px;color:var(--muted)">${capas}/3</div>
    </div>

    ${razones.length?`<div class="razrow anim" style="animation-delay:.09s">
      ${razones.map(r=>'<div class="ri"><div class="ridot"></div><span class="ritxt">'+r+'</span></div>').join('')}
    </div>`:''}

    ${alertas.length?`<div style="margin-bottom:16px" class="anim">
      ${alertas.map(a=>'<div class="alerta-item"><div class="adot"></div><span>'+a+'</span></div>').join('')}
    </div>`:''}

    <div class="anim" style="animation-delay:.13s">
      <div class="stitle">
        <span>Evolucion de scores</span>
        <span style="color:var(--muted);font-size:10px">${historial.length} registro${historial.length!==1?'s':''}</span>
      </div>
      <div class="chart-outer">
        <div class="cfilters" id="cfilters"></div>
        <div class="cwrap">
          ${historial.length>=1?'<canvas id="chart-canvas"></canvas>':
            '<div class="cempty">Sin historial suficiente<small>El grafico crece con cada analisis diario</small></div>'}
        </div>
      </div>
    </div>

    <div class="anim" style="animation-delay:.16s">
      <div class="stitle"><span>Metricas detalladas</span></div>
      <div class="mgrid">${metHTML(m)}</div>
    </div>

    <div class="anim" style="animation-delay:.18s">
      <div class="stitle"><span>Valoracion intrínseca · DCF</span></div>
      <div class="dcf-wrap" id="dcf-section">
        ${dcfHTML(empresa.dcf)}
      </div>
    </div>

    <div class="anim" style="animation-delay:.2s">
      <div class="stitle"><span>F-Score Piotroski</span></div>
      ${fsHTML(m)}
    </div>
  `;

  renderFilters();
  if(historial.length>=1) setTimeout(renderChart,50);
}

function sc5HTML(sc){
  return [
    {l:'Score',      v:sc.composite,         c:'#6c63ff'},
    {l:'Calidad',    v:sc.quality?.score,     c:'#00e896'},
    {l:'Valoracion', v:sc.valuation?.score,   c:'#f5c542'},
    {l:'Seguridad',  v:sc.safety?.score,      c:'#4ecdc4'},
    {l:'Momentum',   v:sc.momentum?.score,    c:'#ff6b35'},
  ].map(d=>`<div class="sc">
    <div class="scl">${d.l}</div>
    <div class="scv" style="color:${d.c}">${d.v??'—'}</div>
    <div class="scb"><div class="scf" style="width:${d.v??0}%;background:${d.c}"></div></div>
  </div>`).join('');
}

function capHTML(ok,lbl){
  return `<div class="ci"><div class="cd ${ok?'on':'off'}"></div><span class="cl2 ${ok?'on':''}">${lbl}</span></div>`;
}

function metHTML(m){
  const f=(v,s='',d=2)=>v!=null?v.toFixed(d)+s:'—';
  const fx=(v)=>v!=null?v.toFixed(1)+'x':'—';
  const altZ=m.altman_z!=null&&m.altman_z<1000?m.altman_z.toFixed(2):'N/A*';
  const azC=altZ==='N/A*'?'vn':m.altman_z>=2.99?'vg':m.altman_z>=1.81?'vw':'vb';
  const grupos=[
    {t:'Rentabilidad',rows:[
      {k:'ROIC',                v:f(m.roic,'%'),                  c:cG(m.roic,20,10)},
      {k:'Gross Profit/Assets', v:f(m.gross_profit_to_assets,'%'),c:cG(m.gross_profit_to_assets,30,15)},
      {k:'Margen bruto',        v:f(m.gross_margin,'%'),           c:cG(m.gross_margin,40,25)},
      {k:'Margen EBIT',         v:f(m.ebit_margin,'%'),            c:cG(m.ebit_margin,20,8)},
      {k:'Margen neto',         v:f(m.net_margin,'%'),             c:cG(m.net_margin,15,8)},
      {k:'ROE',                 v:f(m.roe,'%'),                   c:cG(m.roe,20,10)},
      {k:'ROA',                 v:f(m.roa,'%'),                   c:cG(m.roa,10,5)},
      {k:'FCF Conversion',      v:f(m.fcf_conversion,'%'),        c:cG(m.fcf_conversion,90,70)},
    ]},
    {t:'Valoracion',rows:[
      {k:'EV/EBITDA',  v:fx(m.ev_ebitda),         c:cI(m.ev_ebitda,10,15)},
      {k:'EV/FCF',     v:fx(m.ev_fcf),            c:cI(m.ev_fcf,15,25)},
      {k:'FCF Yield',  v:f(m.fcf_yield,'%'),      c:cG(m.fcf_yield,7,4)},
      {k:'PER',        v:fx(m.per),               c:cI(m.per,15,22)},
      {k:'PEG',        v:m.peg!=null?fx(m.peg):'—',c:'vn'},
      {k:'P/Book',     v:fx(m.price_to_book),     c:'vn'},
    ]},
    {t:'Solidez del balance',rows:[
      {k:'Deuda neta/EBITDA',    v:fx(m.deuda_ebitda),          c:cI(m.deuda_ebitda,1.5,3)},
      {k:'Cobertura intereses',  v:fx(m.cobertura_intereses),   c:cG(m.cobertura_intereses,9,3)},
      {k:'Altman Z-Score',       v:altZ,                         c:azC},
    ]},
    {t:'Momentum de precio',rows:[
      {k:'Momentum 6M',    v:f(m.momentum_6m,'%'),     c:cG(m.momentum_6m,10,0)},
      {k:'Momentum 12M',   v:f(m.momentum_12m,'%'),    c:cG(m.momentum_12m,15,0)},
      {k:'Precio vs MM200',v:f(m.precio_vs_ma200,'%'), c:cG(m.precio_vs_ma200,5,0)},
      {k:'MM200',          v:m.ma200!=null?m.ma200.toFixed(2):'—', c:'vn'},
    ]},
  ];
  return grupos.map(g=>`
    <div class="mgrupo">
      <div class="mgtitle">${g.t}</div>
      ${g.rows.map(r=>`<div class="mrow"><span class="mk">${r.k}</span><span class="mv ${r.c}">${r.v}</span></div>`).join('')}
    </div>`).join('');
}

function dcfHTML(dcf){
  if(!dcf || !dcf.escenarios_dcf){
    return `<div style="color:var(--muted);font-size:12px;padding:20px;text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:10px;">
      Sin datos DCF disponibles — datos financieros insuficientes para esta empresa.
    </div>`;
  }

  const precio = dcf.precio_actual;
  const margen = dcf.margen_seguridad;
  const margenColor = margen==null?'var(--muted)':margen>=20?'var(--green)':margen>=0?'var(--yellow)':'var(--red)';
  const resumenClass = margen==null?'':margen>=5?'positivo':margen<=-5?'negativo':'';

  // ── GAUGE de margen de seguridad ──────────────────────────────────────────
  function gaugeHTML(){
    if(margen==null) return '';
    const clamped = Math.min(Math.max(margen, -60), 60);
    const pct     = ((clamped + 60) / 120) * 100;
    const fillColor = margen>=20?'#00e896':margen>=0?'#f5c542':'#ff4d6d';
    return `<div class="gauge-main" style="color:${margenColor}">${margen>0?'+':''}${margen.toFixed(1)}%</div>
      <div class="gauge-main-sub">Margen de seguridad vs precio actual</div>
      <div class="gauge-wrap" style="padding:4px 14px 14px">
        <div class="gauge-track">
          <div class="gauge-fill" style="width:${pct}%;background:${fillColor}"></div>
          <div class="gauge-marker" style="left:50%"></div>
        </div>
        <div class="gauge-vals"><span>-60%</span><span style="color:var(--muted)">0</span><span>+60%</span></div>
      </div>`;
  }

  // ── ESCENARIOS ────────────────────────────────────────────────────────────
  const esc = dcf.escenarios_dcf || {};
  const escColors = {pesimista:'#ff6b35', base:'#6c63ff', optimista:'#00e896'};
  function escRow(nombre, e){
    if(!e||e.precio_objetivo==null) return '';
    const diff = precio ? (e.precio_objetivo - precio) / precio * 100 : null;
    const dc   = diff==null?'var(--muted)':diff>=0?'var(--green)':'var(--red)';
    return `<div class="esc-row">
      <div class="esc-label">
        <div class="esc-dot" style="background:${escColors[nombre]}"></div>
        ${nombre.charAt(0).toUpperCase()+nombre.slice(1)}
      </div>
      <div>
        <div class="esc-precio" style="color:${escColors[nombre]}">${fmtP(e.precio_objetivo)}</div>
        ${diff!=null?`<div class="esc-margen" style="color:${dc}">${diff>=0?'+':''}${diff.toFixed(1)}% vs actual</div>`:''}
      </div>
      <div class="esc-g" style="text-align:right">
        g₁: ${e.g_fase1}%<br>g₂: ${e.g_fase2}%
      </div>
    </div>`;
  }

  // ── REVERSE DCF ───────────────────────────────────────────────────────────
  function reverseHTML(){
    const r = dcf.reverse_dcf;
    if(!r) return '<div style="color:var(--muted);font-size:12px;padding:12px 14px">Sin datos para Reverse DCF.</div>';
    const maxG = Math.max(Math.abs(r.g_implicito), Math.abs(r.g_fundamental), 15) * 1.2;
    const wImpl = Math.min((Math.abs(r.g_implicito) / maxG)*100, 100);
    const wFund = Math.min((Math.abs(r.g_fundamental) / maxG)*100, 100);
    const cImpl = r.g_implicito > r.g_fundamental ? '#f5c542' : '#00e896';
    return `
      <div class="rdcf-row"><span style="color:var(--muted);font-size:11px">G implícito en precio</span>
        <span style="font-size:15px;font-weight:600;color:${cImpl}">${r.g_implicito>0?'+':''}${r.g_implicito}%</span></div>
      <div class="rdcf-row"><span style="color:var(--muted);font-size:11px">G fundamental (ROIC)</span>
        <span style="font-size:15px;font-weight:600;color:var(--accent)">${r.g_fundamental>0?'+':''}${r.g_fundamental}%</span></div>
      <div class="rdcf-bar-row">
        <div class="rdcf-bar-label"><span>Mercado</span><span style="color:${cImpl}">${r.g_implicito}%</span></div>
        <div class="rdcf-track" style="margin-bottom:6px">
          <div class="rdcf-bar-a" style="width:${wImpl}%;background:${cImpl}"></div>
        </div>
        <div class="rdcf-bar-label"><span>Fundamentales</span><span style="color:var(--accent)">${r.g_fundamental}%</span></div>
        <div class="rdcf-track">
          <div class="rdcf-bar-a" style="width:${wFund}%;background:var(--accent)"></div>
        </div>
      </div>
      <div class="rdcf-interp">${r.interpretacion}</div>`;
  }

  // ── MÉTODOS ───────────────────────────────────────────────────────────────
  function metodosHTML(){
    const items = dcf.precios_por_metodo || [];
    if(!items.length) return '';
    return `<div class="metodos-grid">
      ${items.map(([nombre, p])=>{
        const diff = precio ? (p - precio)/precio*100 : null;
        const dc   = diff==null?'var(--muted)':diff>=0?'var(--green)':'var(--red)';
        return `<div class="metodo-item">
          <div class="metodo-nombre">${nombre}</div>
          <div class="metodo-precio" style="color:${dc}">${fmtP(p)}</div>
          ${diff!=null?`<div class="metodo-diff" style="color:${dc}">${diff>=0?'+':''}${diff.toFixed(1)}%</div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }

  // ── ANALISTAS ─────────────────────────────────────────────────────────────
  function analistasHTML(){
    if(!dcf.target_analistas || !dcf.n_analistas) return '';
    const diff = precio ? (dcf.target_analistas - precio)/precio*100 : null;
    const dc   = diff>=0?'var(--green)':'var(--red)';
    return `<div class="analistas-strip">
      <div class="an-item">
        <div class="an-lbl">Target analistas</div>
        <div class="an-val" style="color:${dc}">${fmtP(dcf.target_analistas)}</div>
      </div>
      <div class="an-item">
        <div class="an-lbl">Upside/downside</div>
        <div class="an-val" style="color:${dc}">${diff!=null?(diff>=0?'+':'')+diff.toFixed(1)+'%':'—'}</div>
      </div>
      <div class="an-item">
        <div class="an-lbl">Analistas</div>
        <div class="an-val">${dcf.n_analistas}</div>
      </div>
      <div class="an-item">
        <div class="an-lbl">WACC usado</div>
        <div class="an-val">${dcf.wacc}%</div>
      </div>
      <div class="an-item">
        <div class="an-lbl">G base</div>
        <div class="an-val">${dcf.g_base}%</div>
      </div>
    </div>`;
  }

  function fmtP(v){
    if(v==null) return '—';
    const mon = dcf.moneda==='EUR'?'€':'$';
    return v.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+mon;
  }

  return `
    <div class="dcf-resumen ${resumenClass}">${dcf.resumen||'—'}</div>

    <div class="dcf-grid">
      <!-- Escenarios DCF -->
      <div class="dcf-card">
        <div class="dcf-card-title">
          <span>Escenarios DCF · 2 fases</span>
          <span class="dcf-card-sub">WACC ${dcf.wacc}% · g ${dcf.g_base}%</span>
        </div>
        ${escRow('pesimista', esc.pesimista)}
        ${escRow('base',      esc.base)}
        ${escRow('optimista', esc.optimista)}
      </div>

      <!-- Gauge + Precio consenso -->
      <div class="dcf-card">
        <div class="dcf-card-title">
          <span>Precio consenso</span>
          <span class="dcf-card-sub" style="color:${dcf.confianza==='alta'?'var(--green)':dcf.confianza==='media'?'var(--yellow)':'var(--red)'}">
            confianza ${dcf.confianza}
          </span>
        </div>
        ${gaugeHTML()}
        ${metodosHTML()}
        ${analistasHTML()}
      </div>
    </div>

    <!-- Reverse DCF -->
    <div class="dcf-card" style="margin-bottom:0">
      <div class="dcf-card-title">
        <span>Reverse DCF — crecimiento implícito en precio</span>
        <span class="dcf-card-sub">Método Damodaran</span>
      </div>
      ${reverseHTML()}
    </div>
  `;
}

function fsHTML(m){
  const fs=m.fscore??0;
  const col=fs>=7?'var(--compra)':fs>=4?'var(--vigilar)':'var(--alerta)';
  const lbl=fs>=7?'Señal fuerte — fundamentales mejorando':fs>=4?'Señal neutral':'Señal debil — posible deterioro';
  const det=m.fscore_detalle||{};
  const bars=Array.from({length:9},(_,i)=>
    `<div class="fsbar" style="background:${i<fs?col:'var(--border2)'}"></div>`).join('');
  const items=Object.entries(det).map(([k,v])=>({lbl:FSLABELS[k]||k.replace(/_/g,' '),ok:v===1}));
  return `
    <div class="fshero">
      <div class="fsnum" style="color:${col}">${fs}</div>
      <div>
        <div style="font-size:10px;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;margin-bottom:4px">F-Score Piotroski / 9</div>
        <div style="font-size:12px;color:${col}">${lbl}</div>
      </div>
      <div class="fsbars">${bars}</div>
    </div>
    <div class="fsitems">
      ${items.length?items.map(i=>`
        <div class="fsi">
          <div class="fsc ${i.ok?'ok':'ko'}">${i.ok?'&#10003;':'&#10007;'}</div>
          <span class="fst ${i.ok?'ok':''}">${i.lbl}</span>
        </div>`).join('')
      :'<div style="color:var(--muted);font-size:12px;padding:8px;grid-column:1/-1">Detalle no disponible</div>'}
    </div>`;
}

function renderFilters(){
  const w=document.getElementById('cfilters');
  if(!w)return;
  w.innerHTML=SERIES.map((s,i)=>
    `<button class="sfbtn ${s.on?'on':''}" onclick="togS(${i})" id="sb${i}">
      <div class="sdot" style="background:${s.color}"></div>${s.label}
    </button>`).join('');
}
function togS(i){
  SERIES[i].on=!SERIES[i].on;
  document.getElementById('sb'+i).classList.toggle('on',SERIES[i].on);
  renderChart();
}
function renderChart(){
  const canvas=document.getElementById('chart-canvas');
  if(!canvas)return;
  if(chartInst){chartInst.destroy();chartInst=null;}
  const labels=historial.map(d=>fmtF(d.fecha));
  const pp=historial.map(d=>d.precio||0).filter(p=>p>0);
  const mn=Math.min(...pp),mx=Math.max(...pp);
  const np=historial.map(d=>!d.precio||mx===mn?50:Math.round(((d.precio-mn)/(mx-mn))*100));
  const datasets=SERIES.filter(s=>s.on).map(s=>{
    let data=s.key==='precio'?np:s.key==='fscore'?historial.map(d=>(d.fscore||0)*10):historial.map(d=>d[s.key]??null);
    return{label:s.label,data,borderColor:s.color,backgroundColor:s.color+'18',borderWidth:2,
      pointRadius:historial.length<=10?4:2,pointHoverRadius:6,tension:.35,fill:false};
  });
  chartInst=new Chart(canvas,{
    type:'line',data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:'#18181f',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
          titleColor:'#6b6b80',bodyColor:'#e8e8f0',padding:10,
          titleFont:{family:"'DM Mono',monospace",size:11},bodyFont:{family:"'DM Mono',monospace",size:12},
          callbacks:{label:ctx=>' '+ctx.dataset.label+': '+ctx.parsed.y}},
      },
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6b6b80',font:{family:"'DM Mono'",size:10},maxTicksLimit:8},border:{color:'rgba(255,255,255,0.07)'}},
        y:{min:0,max:100,grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6b6b80',font:{family:"'DM Mono'",size:10},stepSize:20},border:{color:'rgba(255,255,255,0.07)'}},
      },
    },
  });
}
function cG(v,g,o){if(v==null)return 'vn';return v>=g?'vg':v>=o?'vw':'vb';}
function cI(v,g,o){if(v==null)return 'vn';return v<=g?'vg':v<=o?'vw':'vb';}
function fmtF(iso){if(!iso)return '—';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});}

init();
</script>
