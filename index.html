<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bot Inversiones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0a0f;
  --bg2:       #111118;
  --bg3:       #18181f;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --text:      #e8e8f0;
  --muted:     #6b6b80;
  --compra:    #00e896;
  --vigilar:   #f5c542;
  --neutro:    #5a5a72;
  --alerta:    #ff4d6d;
  --accent:    #6c63ff;
  --mono:      'DM Mono', monospace;
  --display:   'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* GRAIN OVERLAY */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* LAYOUT */
.shell {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 16px 60px;
  position: relative;
  z-index: 1;
}

/* HEADER */
header {
  padding: 32px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.header-left h1 {
  font-family: var(--display);
  font-size: clamp(22px, 5vw, 32px);
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--text);
  line-height: 1;
}

.header-left .subtitle {
  margin-top: 6px;
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.fecha-badge {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
}

.refresh-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: border-color 0.2s, color 0.2s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ALERTAS BANNER */
#alertas-banner {
  margin-bottom: 24px;
}

.alerta-item {
  background: rgba(255,77,109,0.08);
  border: 1px solid rgba(255,77,109,0.25);
  border-left: 3px solid var(--alerta);
  border-radius: 0 6px 6px 0;
  padding: 10px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  animation: slideIn 0.3s ease forwards;
}

.alerta-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--alerta);
  flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}

.alerta-ticker {
  color: var(--alerta);
  font-weight: 500;
  min-width: 60px;
}

.alerta-texto { color: #c0a0a8; }

/* STATS ROW */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  transition: border-color 0.2s;
}
.stat-card:hover { border-color: var(--border2); }

.stat-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.stat-value {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}

.stat-value.compra  { color: var(--compra); }
.stat-value.vigilar { color: var(--vigilar); }
.stat-value.alerta  { color: var(--alerta); }
.stat-value.neutro  { color: var(--text); }

/* FILTROS */
.filtros {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}

.filtro-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.filtro-btn:hover { border-color: var(--border2); color: var(--text); }
.filtro-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.filtro-btn.f-compra.active  { background: var(--compra);  border-color: var(--compra);  color: #000; }
.filtro-btn.f-vigilar.active { background: var(--vigilar); border-color: var(--vigilar); color: #000; }
.filtro-btn.f-alerta.active  { background: var(--alerta);  border-color: var(--alerta);  color: #fff; }

.sort-select {
  margin-left: auto;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  outline: none;
}
.sort-select:focus { border-color: var(--border2); }

/* TABLA RANKING */
.ranking-header {
  display: grid;
  grid-template-columns: 28px 100px 1fr 56px 56px 56px 56px 80px;
  gap: 8px;
  padding: 6px 14px;
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}

.ranking-list { display: flex; flex-direction: column; gap: 4px; }

.empresa-row {
  display: grid;
  grid-template-columns: 28px 100px 1fr 56px 56px 56px 56px 80px;
  gap: 8px;
  align-items: center;
  padding: 12px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  animation: rowIn 0.3s ease forwards;
  opacity: 0;
}

.empresa-row:hover {
  background: var(--bg3);
  border-color: var(--border2);
}

@keyframes rowIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.col-pos {
  color: var(--muted);
  font-size: 11px;
  text-align: center;
}

.col-ticker {
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.04em;
}

.col-nombre {
  color: var(--muted);
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.col-score {
  text-align: center;
  font-weight: 500;
  font-size: 13px;
}

.col-sub {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
}

.col-señal {
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.señal-badge {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.06em;
  padding: 3px 8px;
  border-radius: 3px;
  white-space: nowrap;
}

.s-COMPRA       { background: rgba(0,232,150,0.12); color: var(--compra);  border: 1px solid rgba(0,232,150,0.25); }
.s-VIGILAR      { background: rgba(245,197,66,0.10); color: var(--vigilar); border: 1px solid rgba(245,197,66,0.25); }
.s-NEUTRO       { background: rgba(90,90,114,0.15); color: var(--muted);   border: 1px solid var(--border); }
.s-ALERTA_SALIDA{ background: rgba(255,77,109,0.10); color: var(--alerta);  border: 1px solid rgba(255,77,109,0.25); }

/* SCORE BAR inline */
.score-bar-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}
.score-bar-track {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
}

/* CAPAS DOTS */
.capas-wrap { display: flex; gap: 3px; justify-content: center; }
.capa-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border2);
}
.capa-dot.on { background: var(--compra); }

/* MODAL DETALLE */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-bottom: none;
  border-radius: 16px 16px 0 0;
  width: 100%;
  max-width: 900px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 28px 24px 40px;
  animation: slideUp 0.25s ease;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.modal-close {
  float: right;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
  padding: 0;
}
.modal-close:hover { color: var(--text); }

.modal-ticker {
  font-family: var(--display);
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 2px;
}

.modal-nombre {
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 20px;
}

.modal-scores-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.modal-score-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
}

.modal-score-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.modal-score-value {
  font-family: var(--display);
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 6px;
}

.modal-score-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.modal-score-bar-fill {
  height: 100%;
  border-radius: 2px;
}

.modal-section-title {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 20px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.razones-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }

.razon-item {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  font-size: 12px;
}
.razon-ok   { color: var(--compra); }
.razon-warn { color: var(--alerta); }

.alerta-modal-item {
  background: rgba(255,77,109,0.08);
  border: 1px solid rgba(255,77,109,0.2);
  border-left: 3px solid var(--alerta);
  border-radius: 0 6px 6px 0;
  padding: 8px 12px;
  font-size: 12px;
  color: #c0a0a8;
  margin-bottom: 6px;
}

/* MOBILE */
@media (max-width: 600px) {
  .ranking-header { display: none; }

  .empresa-row {
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    gap: 6px 12px;
  }

  .col-pos     { display: none; }
  .col-ticker  { font-size: 14px; grid-column: 1; grid-row: 1; }
  .col-nombre  { grid-column: 1; grid-row: 2; font-size: 11px; }
  .col-score   { grid-column: 2; grid-row: 1; font-size: 16px; }
  .col-señal   { grid-column: 2; grid-row: 2; }
  .col-sub     { display: none; }

  .stats-row   { grid-template-columns: repeat(2, 1fr); }
  .modal-scores-grid { grid-template-columns: 1fr 1fr; }
  .modal { padding: 20px 16px 40px; }
}

/* EMPTY STATE */
.empty {
  text-align: center;
  color: var(--muted);
  padding: 48px 0;
  font-size: 12px;
  letter-spacing: 0.06em;
}

/* LOADING */
.loading {
  text-align: center;
  color: var(--muted);
  padding: 48px 0;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.loading::after {
  content: '';
  animation: dots 1.5s steps(3, end) infinite;
}
@keyframes dots {
  0%   { content: ''; }
  33%  { content: '.'; }
  66%  { content: '..'; }
  100% { content: '...'; }
}

/* FOOTER */
footer {
  text-align: center;
  padding: 24px 0 0;
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.08em;
  border-top: 1px solid var(--border);
  margin-top: 32px;
}
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="header-left">
      <h1>Bot Inversiones</h1>
      <div class="subtitle">Motor de análisis · Fase 2</div>
    </div>
    <div class="header-right">
      <span class="fecha-badge" id="fecha-badge">—</span>
      <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
    </div>
  </header>

  <div id="alertas-banner"></div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">En compra</div>
      <div class="stat-value compra" id="stat-compra">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">En vigilar</div>
      <div class="stat-value vigilar" id="stat-vigilar">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Alertas salida</div>
      <div class="stat-value alerta" id="stat-alerta">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Score medio</div>
      <div class="stat-value neutro" id="stat-medio">—</div>
    </div>
  </div>

  <div class="filtros">
    <button class="filtro-btn active" onclick="setFiltro('todos', this)">Todos</button>
    <button class="filtro-btn f-compra"  onclick="setFiltro('COMPRA', this)">Compra</button>
    <button class="filtro-btn f-vigilar" onclick="setFiltro('VIGILAR', this)">Vigilar</button>
    <button class="filtro-btn f-alerta"  onclick="setFiltro('ALERTA_SALIDA', this)">Alerta salida</button>
    <select class="sort-select" onchange="setSort(this.value)">
      <option value="composite">Ordenar: score</option>
      <option value="quality">Ordenar: calidad</option>
      <option value="valuation">Ordenar: valoración</option>
      <option value="momentum">Ordenar: momentum</option>
    </select>
  </div>

  <div class="ranking-header">
    <span>#</span>
    <span>Ticker</span>
    <span>Empresa</span>
    <span style="text-align:center">Score</span>
    <span style="text-align:center">Cal</span>
    <span style="text-align:center">Val</span>
    <span style="text-align:center">Mom</span>
    <span style="text-align:right">Señal</span>
  </div>

  <div class="ranking-list" id="ranking-list">
    <div class="loading">Cargando datos</div>
  </div>

</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModalBtn()">×</button>
    <div class="modal-ticker" id="m-ticker"></div>
    <div class="modal-nombre" id="m-nombre"></div>

    <div class="modal-scores-grid" id="m-scores"></div>

    <div class="modal-section-title">Señal · capas alineadas</div>
    <div id="m-capas"></div>
    <div class="razones-list" id="m-razones"></div>

    <div id="m-alertas-wrap">
      <div class="modal-section-title">Alertas activas</div>
      <div id="m-alertas"></div>
    </div>
  </div>
</div>

<footer>
  Bot Inversiones · datos vía Yahoo Finance · actualización diaria al cierre
</footer>

<script>
// ─── DATOS EMBEBIDOS (fallback si no hay ranking.json) ──────────────────────
const FALLBACK = {"fecha":"2026-03-23T21:26:10.235679","ranking":[{"pos":1,"ticker":"REP.MC","nombre":"Repsol, S.A.","sector":"Energy","precio":22.69,"composite":83.3,"quality":70,"valuation":96,"safety":67,"momentum":100,"señal":"COMPRA","capas":3,"alertas":[],"confianza":"alta"},{"pos":2,"ticker":"VID.MC","nombre":"Vidrala, S.A.","sector":"Consumer Cyclical","precio":74.0,"composite":79.2,"quality":84,"valuation":100,"safety":100,"momentum":4,"señal":"NEUTRO","capas":1,"alertas":["Precio muy por debajo de MM200 — tendencia bajista"],"confianza":"alta"},{"pos":3,"ticker":"ACS.MC","nombre":"ACS, Actividades de Construcción y Servicios, S.A.","sector":"Industrials","precio":105.3,"composite":77.3,"quality":82,"valuation":62,"safety":78,"momentum":100,"señal":"COMPRA","capas":2,"alertas":[],"confianza":"alta"},{"pos":4,"ticker":"ITX.MC","nombre":"Industria de Diseño Textil, S.A.","sector":"Consumer Cyclical","precio":50.1,"composite":71.6,"quality":90,"valuation":38,"safety":100,"momentum":82,"señal":"NEUTRO","capas":1,"alertas":["Valoración cara — múltiplos elevados"],"confianza":"alta"},{"pos":5,"ticker":"JNJ","nombre":"Johnson & Johnson","sector":"Healthcare","precio":235.42,"composite":67.7,"quality":76,"valuation":35,"safety":100,"momentum":100,"señal":"NEUTRO","capas":1,"alertas":["Valoración cara — múltiplos elevados"],"confianza":"alta"},{"pos":6,"ticker":"PG","nombre":"The Procter & Gamble Company","sector":"Consumer Defensive","precio":143.99,"composite":66.0,"quality":86,"valuation":48,"safety":100,"momentum":32,"señal":"NEUTRO","capas":0,"alertas":[],"confianza":"alta"},{"pos":7,"ticker":"AAPL","nombre":"Apple Inc.","sector":"Technology","precio":251.49,"composite":63.0,"quality":96,"valuation":14,"safety":100,"momentum":65,"señal":"NEUTRO","capas":1,"alertas":["Valoración cara — múltiplos elevados"],"confianza":"alta"},{"pos":8,"ticker":"MSFT","nombre":"Microsoft Corporation","sector":"Technology","precio":383.0,"composite":56.1,"quality":82,"valuation":32,"safety":100,"momentum":14,"señal":"NEUTRO","capas":0,"alertas":["Valoración cara — múltiplos elevados","Precio muy por debajo de MM200 — tendencia bajista"],"confianza":"alta"},{"pos":9,"ticker":"FER.MC","nombre":"Ferrovial SE","sector":"Industrials","precio":54.34,"composite":53.6,"quality":74,"valuation":20,"safety":28,"momentum":95,"señal":"NEUTRO","capas":1,"alertas":["Valoración cara — múltiplos elevados","Deuda/EBITDA elevada (4.5x)"],"confianza":"alta"},{"pos":10,"ticker":"V","nombre":"Visa Inc.","sector":"Financial Services","precio":304.44,"composite":51.4,"quality":81,"valuation":20,"safety":100,"momentum":13,"señal":"NEUTRO","capas":0,"alertas":["Valoración cara — múltiplos elevados"],"confianza":"alta"}]};

// ─── ESTADO ─────────────────────────────────────────────────────────────────
let allData = [];
let filtro  = 'todos';
let sortBy  = 'composite';

// ─── CARGA DE DATOS ──────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('data/ranking.json?t=' + Date.now());
    if (!res.ok) throw new Error('no file');
    const json = await res.json();
    allData = json.ranking || [];
    renderFecha(json.fecha);
  } catch {
    // fallback a datos embebidos
    allData = FALLBACK.ranking || [];
    renderFecha(FALLBACK.fecha);
  }
  // normalizar clave señal (el JSON tiene 'seńal' con tilde extraña a veces)
  allData = allData.map(r => ({
    ...r,
    señal: r['señal'] || r['se\u0301al'] || r['senal'] || 'NEUTRO',
    alertas: r.alertas || []
  }));
  renderAll();
}

function renderFecha(iso) {
  if (!iso) return;
  const d = new Date(iso);
  document.getElementById('fecha-badge').textContent =
    d.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' }) +
    ' · ' + d.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
}

// ─── RENDER PRINCIPAL ────────────────────────────────────────────────────────
function renderAll() {
  renderStats();
  renderAlertas();
  renderRanking();
}

function renderStats() {
  const compra  = allData.filter(r => r.señal === 'COMPRA').length;
  const vigilar = allData.filter(r => r.señal === 'VIGILAR').length;
  const alerta  = allData.filter(r => r.señal === 'ALERTA_SALIDA').length;
  const medio   = allData.length
    ? (allData.reduce((s, r) => s + r.composite, 0) / allData.length).toFixed(1)
    : '—';

  document.getElementById('stat-compra').textContent  = compra;
  document.getElementById('stat-vigilar').textContent = vigilar;
  document.getElementById('stat-alerta').textContent  = alerta;
  document.getElementById('stat-medio').textContent   = medio;
}

function renderAlertas() {
  const banner = document.getElementById('alertas-banner');
  banner.innerHTML = '';
  allData.forEach(r => {
    if (!r.alertas || r.alertas.length === 0) return;
    r.alertas.forEach(txt => {
      const div = document.createElement('div');
      div.className = 'alerta-item';
      div.innerHTML = `
        <div class="alerta-dot"></div>
        <span class="alerta-ticker">${r.ticker}</span>
        <span class="alerta-texto">${txt}</span>`;
      banner.appendChild(div);
    });
  });
}

function renderRanking() {
  const list = document.getElementById('ranking-list');
  list.innerHTML = '';

  let data = [...allData];

  // Filtro señal
  if (filtro !== 'todos') {
    data = data.filter(r => r.señal === filtro);
  }

  // Sort
  data.sort((a, b) => (b[sortBy] ?? 0) - (a[sortBy] ?? 0));

  if (data.length === 0) {
    list.innerHTML = '<div class="empty">Sin resultados para este filtro</div>';
    return;
  }

  data.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'empresa-row';
    row.style.animationDelay = (i * 40) + 'ms';

    const scoreColor = scoreToColor(r.composite);
    const capasHtml  = [0,1,2].map(n =>
      `<div class="capa-dot ${n < r.capas ? 'on' : ''}"></div>`
    ).join('');

    row.innerHTML = `
      <div class="col-pos">${i+1}</div>
      <div class="col-ticker">${r.ticker}</div>
      <div class="col-nombre">${r.nombre}</div>
      <div class="col-score score-bar-wrap">
        <div class="score-bar-track">
          <div class="score-bar-fill" style="width:${r.composite}%;background:${scoreColor}"></div>
        </div>
        <span style="min-width:32px;text-align:right;color:${scoreColor}">${r.composite}</span>
      </div>
      <div class="col-sub" style="color:${scoreToColor(r.quality)}">${r.quality}</div>
      <div class="col-sub" style="color:${scoreToColor(r.valuation)}">${r.valuation}</div>
      <div class="col-sub" style="color:${scoreToColor(r.momentum)}">${r.momentum}</div>
      <div class="col-señal">
        <span class="señal-badge s-${r.señal}">${labelSeñal(r.señal)}</span>
      </div>`;

    row.addEventListener('click', () => openModal(r));
    list.appendChild(row);
  });
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(r) {
  document.getElementById('m-ticker').textContent = r.ticker;
  document.getElementById('m-nombre').textContent = `${r.nombre} · ${r.sector} · €${r.precio}`;

  // Score cards
  const dims = [
    { label: 'Score compuesto', val: r.composite, color: scoreToColor(r.composite) },
    { label: 'Calidad',         val: r.quality,   color: scoreToColor(r.quality) },
    { label: 'Valoración',      val: r.valuation, color: scoreToColor(r.valuation) },
    { label: 'Momentum',        val: r.momentum,  color: scoreToColor(r.momentum) },
    { label: 'Seguridad',       val: r.safety,    color: scoreToColor(r.safety) },
  ];
  document.getElementById('m-scores').innerHTML = dims.map(d => `
    <div class="modal-score-card">
      <div class="modal-score-label">${d.label}</div>
      <div class="modal-score-value" style="color:${d.color}">${d.val}</div>
      <div class="modal-score-bar">
        <div class="modal-score-bar-fill" style="width:${d.val}%;background:${d.color}"></div>
      </div>
    </div>`).join('');

  // Capas
  const capasHtml = [0,1,2].map(n =>
    `<div class="capa-dot ${n < r.capas ? 'on' : ''}" style="width:10px;height:10px;display:inline-block;border-radius:50%;margin-right:4px;background:${n < r.capas ? 'var(--compra)' : 'var(--border2)'}"></div>`
  ).join('');
  document.getElementById('m-capas').innerHTML =
    `<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
       ${capasHtml}
       <span style="font-size:11px;color:var(--muted)">${r.capas}/3 capas alineadas · señal: </span>
       <span class="señal-badge s-${r.señal}" style="margin-left:4px">${labelSeñal(r.señal)}</span>
     </div>`;

  // Razones (vacías — futuro: vendrán del resultados.json)
  document.getElementById('m-razones').innerHTML = '';

  // Alertas
  const alertasWrap = document.getElementById('m-alertas-wrap');
  const alertasDiv  = document.getElementById('m-alertas');
  if (r.alertas && r.alertas.length > 0) {
    alertasWrap.style.display = 'block';
    alertasDiv.innerHTML = r.alertas.map(a =>
      `<div class="alerta-modal-item">${a}</div>`
    ).join('');
  } else {
    alertasWrap.style.display = 'none';
  }

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

// ─── FILTROS Y SORT ──────────────────────────────────────────────────────────
function setFiltro(f, btn) {
  filtro = f;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRanking();
}

function setSort(v) {
  sortBy = v;
  renderRanking();
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function scoreToColor(v) {
  if (v === null || v === undefined) return 'var(--muted)';
  if (v >= 75) return 'var(--compra)';
  if (v >= 55) return 'var(--vigilar)';
  if (v >= 35) return 'var(--text)';
  return 'var(--alerta)';
}

function labelSeñal(s) {
  const m = { COMPRA:'COMPRA', VIGILAR:'VIGILAR', NEUTRO:'NEUTRO',
              ALERTA_SALIDA:'ALERTA', VENTA:'VENTA' };
  return m[s] || s;
}

// ─── TECLADO ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalBtn();
});

// ─── INIT ────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
